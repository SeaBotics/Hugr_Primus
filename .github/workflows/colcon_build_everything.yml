name: ROS2 CI

on:
  pull_request:
  workflow_dispatch: 

jobs:
  build:
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up QEMU for multi‑arch support
        uses: docker/setup-qemu-action@v2
        with:
          platforms: arm64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull ARM64 ROS2 image
        run: |
          docker pull --platform linux/arm64 ghcr.io/seabotics/ros2-humble:latest

      - name: Run ROS2 build inside ARM64 container
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -e ROS_DISTRO=humble \
            -v ${{ github.workspace }}:/ws \
            ghcr.io/seabotics/ros2-humble:latest \
            bash -c "
              cd /ws/seabotics_ws &&
              rosdep update &&
              rosdep install --from-paths src --ignore-src -r -y &&
              colcon build --symlink-install"


      - name: Run ROS2 tests inside ARM64 container
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/ws \
            ghcr.io/seabotics/ros2-humble:latest \
            bash -c "
              cd /ws/seabotics_ws &&
              colcon test &&
              colcon test-result --verbose"
