ekf_filter_node_local:
  ros__parameters:
    use_sim_time: false
    frequency: 30.0
    two_d_mode: true
    sensor_timeout: 0.1

    # Referansesystemer
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Inndata 1: Hastighet og svingerater fra Xsens
    # Matrise: [X pos, Y pos, Z pos, 
    #           Roll, Pitch, Yaw, 
    #           X fart, Y fart, Z fart, 
    #           Roll fart, Pitch fart, Yaw fart, 
    #           X aks, Y aks, Z aks]
    twist0: /filter/twist
    twist0_config: [false, false, false,
                    false, false, false,
                    true,  true,  false,
                    false, false, true,
                    false, false, false]
    twist0_relative: true

ekf_filter_node_global:
  ros__parameters:
    use_sim_time: false
    frequency: 30.0
    two_d_mode: true
    sensor_timeout: 0.1

    # Referansesystemer
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    # Inndata 1: Hastighet (Samme kilde som lokal for kontinuitet)
    twist0: /filter/twist
    twist0_config: [false, false, false,
                    false, false, false,
                    true,  true,  false,
                    false, false, true,
                    false, false, false]
    twist0_relative: true

    # Inndata 2: Global posisjon (Fra navsat_transform_node)
    odom0: /odometry/gps
    odom0_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom0_relative: false

navsat_transform_node:
  ros__parameters:
    use_sim_time: false
    frequency: 30.0
    delay: 3.0

    # Justering av Nord-referanse:
    # 0.0 antar at Xsens leverer "True North" (WMM korrigert internt).
    # Bruk ~0.08 hvis dere ser at kartet er rotert ca 5 grader feil i Agder.
    magnetic_declination_radians: 0.0
    
    # 0.0 antar at Xsens-driveren sender ENU-standard (Øst = 0).
    yaw_offset: 0.0

    # Innstillinger for overflatefartøy
    zero_altitude: true
    publish_filtered_gps: true
    broadcast_cartesian_transform: true
    wait_for_datum: false
    use_odometry_yaw: false
