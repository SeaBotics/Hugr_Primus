### This is the default setting on what the luxonis driver uses without extra configuration.

### Use this file as an overview for what parameters the camrea driver accepts.

### parameters legend:
#   "r_" means a parameter can be freely modified during runtime
#   "i_" means a parameter is set inused during camera initialization.
#   initialization happens when a camera is stopped and restarted, not only when it is fully powered off.

# Top‑level namespace for all ROS parameters
ros__parameters:

  # -------------------- Camera node --------------------
  camera:
    i_calibration_dump: false          # Dump calibration data to file?
    i_enable_diagnostics: true         # Run diagnostic checks?
    i_enable_ir: true                  # Enable infrared emitter?
    i_enable_sync: false               # Sync multiple cameras?
    i_external_calibration_path: ""    # Path to external calibration file
    i_floodlight_brightness: 0         # Floodlight intensity
    i_ip: ""                           # Camera IP (for network‑ed devices)
    i_laser_dot_brightness: 800        # Laser dot power
    i_mx_id: ""                        # MXID for device identification
    i_nn_type: none                    # Neural‑net type (none = disabled)
    i_pipeline_dump: false             # Dump pipeline graph?
    i_pipeline_type: RGBD              # Pipeline mode (RGB‑D)
    i_publish_tf_from_calibration: false
    i_restart_on_diagnostics_error: false
    i_rs_compat: false                # RealSense compatibility flag
    i_tf_base_frame: oak              # Base TF frame name
    i_tf_cam_pitch: "0.0"              # Camera pitch offset (rad)
    i_tf_cam_pos_x: "0.0"              # Camera X position offset (mm)
    i_tf_cam_pos_y: "0.0"              # Camera Y position offset (mm)
    i_tf_cam_pos_z: "0.0"              # Camera Z position offset (mm)
    i_tf_cam_roll: "0.0"               # Camera roll offset (rad)
    i_tf_cam_yaw: "0.0"                # Camera yaw offset (rad)
    i_tf_camera_model: ""              # Camera model name for TF
    i_tf_camera_name: oak              # TF camera name
    i_tf_custom_urdf_location: ""      # Custom URDF path
    i_tf_custom_xacro_args: ""         # Custom XACRO arguments
    i_tf_imu_from_descr: "false"       # Publish IMU TF from descriptor?
    i_tf_parent_frame: oak-d-base-frame
    i_usb_port_id: ""                  # USB port identifier
    i_usb_speed: SUPER_PLUS           # USB speed mode
    diagnostic_updater:
      period: 1.0                     # Diagnostic update period (s)

  # -------------------- Pipeline generator --------------------
  pipeline_gen:
    i_enable_diagnostics: true         # Run diagnostics for pipeline
    i_enable_imu: true                 # Enable IMU in pipeline
    i_enable_sync: false               # Sync pipeline stages?

  # -------------------- IMU node --------------------
  imu:
    i_acc_cov: 0.0                     # Accelerometer covariance
    i_acc_freq: 400                    # Accelerometer sampling rate (Hz)
    i_batch_report_threshold: 5        # Batch size before reporting
    i_enable_rotation: false           # Publish rotation data?
    i_get_base_device_timestamp: false
    i_gyro_cov: 0.0                    # Gyro covariance
    i_gyro_freq: 400                   # Gyro sampling rate (Hz)
    i_mag_cov: 0.0                     # Magnetometer covariance
    i_max_batch_reports: 10            # Max batched reports
    i_message_type: IMU                # ROS message type
    i_rot_cov: -1.0                    # Rotation covariance (invalid = auto)
    i_sync_method: LINEAR_INTERPOLATE_ACCEL
    i_update_ros_base_time_on_ros_msg: false

  # -------------------- Left RGB sensor --------------------
  left:
    i_add_exposure_offset: false
    i_board_socket_id: 1               # Socket number for left sensor
    i_calibration_file: ""
    i_disable_node: false
    i_enable_feature_tracker: false
    i_enable_lazy_publisher: true     # Publish only when there are subscribers
    i_enable_nn: false                 # Neural‑net inference disabled
    i_exposure_offset: 0
    i_fps: 30.0                        # Frame rate
    i_fsync_continuous: false
    i_fsync_trigger: false
    i_get_base_device_timestamp: false
    i_height: 720
    i_low_bandiwdth_frame_freq: 30
    i_low_bandwidth: false
    i_low_bandwidth_bitrate: 0
    i_low_bandwidth_ffmpeg_encoder: libx264
    i_low_bandwidth_profile: 4
    i_low_bandwidth_quality: 50
    i_max_q_size: 30
    i_publish_compressed: false
    i_publish_topic: false
    i_resolution: 720P
    i_reverse_stereo_socket_order: false
    i_sensor_img_orientation: AUTO
    i_set_isp3a_fps: false
    i_simulate_from_topic: false
    i_simulated_topic_name: ""
    i_synced: false
    i_update_ros_base_time_on_ros_msg: false
    i_width: 1280
    r_exposure: 1000                  # Exposure time (µs)
    r_iso: 800                        # ISO sensitivity
    r_set_man_exposure: false

  # -------------------- Neural‑net node (generic) --------------------
  nn:
    i_board_socket_id: 0
    i_disable_resize: false
    i_enable_passthrough: false
    i_enable_passthrough_depth: false
    i_get_base_device_timestamp: false
    i_num_inference_threads: 2        # Threads for NN inference
    i_num_pool_frames: 4              # Frames kept in pool
    i_update_ros_base_time_on_ros_msg: false

  # -------------------- RGB sensor (main camera) --------------------
  rgb:
    i_add_exposure_offset: false
    i_board_socket_id: 0
    i_calibration_file: ""
    i_disable_node: false
    i_enable_feature_tracker: false
    i_enable_lazy_publisher: true
    i_enable_nn: false
    i_enable_preview: false
    i_exposure_offset: 0
    i_fps: 30.0
    i_fsync_continuous: false
    i_fsync_trigger: false
    i_get_base_device_timestamp: false
    i_height: 720
    i_interleaved: false
    i_isp_den: 3
    i_isp_num: 2
    i_keep_preview_aspect_ratio: true
    i_low_bandiwdth_frame_freq: 30
    i_low_bandwidth: true
    i_low_bandwidth_bitrate: 0
    i_low_bandwidth_ffmpeg_encoder: libx264
    i_low_bandwidth_profile: 4
    i_low_bandwidth_quality: 50
    i_max_q_size: 30
    i_output_isp: true                # Output ISP data?
    i_preview_height: 300
    i_preview_size: 300
    i_preview_width: 300
    i_publish_compressed: false
    i_publish_topic: true             # Publish RGB images?
    i_resolution: 1080P
    i_reverse_stereo_socket_order: false
    i_sensor_img_orientation: AUTO
    i_set_isp3a_fps: false
    i_set_isp_scale: true
    i_simulate_from_topic: false
    i_simulated_topic_name: ""
    i_synced: false
    i_update_ros_base_time_on_ros_msg: false
    i_width: 1280
    r_exposure: 20000                 # Exposure time (µs)
    r_focus: 1
    r_iso: 800
    r_set_man_exposure: false
    r_set_man_focus: false
    r_set_man_whitebalance: false
    r_whitebalance: 3300

  # -------------------- Right RGB sensor --------------------
  right:
    i_add_exposure_offset: false
    i_board_socket_id: 2
    i_calibration_file: ""
    i_disable_node: false
    i_enable_feature_tracker: false
    i_enable_lazy_publisher: true
    i_enable_nn: false
    i_exposure_offset: 0
    i_fps: 30.0
    i_fsync_continuous: false
    i_fsync_trigger: false
    i_get_base_device_timestamp: false
    i_height: 720
    i_low_bandiwdth_frame_freq: 30
    i_low_bandwidth: false
    i_low_bandwidth_bitrate: 0
    i_low_bandwidth_ffmpeg_encoder: libx264
    i_low_bandwidth_profile: 4
    i_low_bandwidth_quality: 50
    i_max_q_size: 30
    i_publish_compressed: false
    i_publish_topic: false
    i_resolution: 720P
    i_reverse_stereo_socket_order: false
    i_sensor_img_orientation: AUTO
    i_set_isp3a_fps: false
    i_simulate_from_topic: false
    i_simulated_topic_name: ""
    i_synced: false
    i_update_ros_base_time_on_ros_msg: false
    i_width: 1280
    r_exposure: 1000
    r_iso: 800
    r_set_man_exposure: false

  # -------------------- Stereo depth processing --------------------
  stereo:
    i_add_exposure_offset: false
    i_align_depth: true               # Align depth to color frame
    i_bilateral_sigma: 0
    i_board_socket_id: 0
    i_depth_filter_size: 5
    i_depth_preset: HIGH_ACCURACY
    i_disparity_width: DISPARITY_96
    i_enable_alpha_scaling: false
    i_alpha_scaling: 0.0
    i_enable_brightness_filter: false
    i_brightness_filter_min_brightness: 0
    i_brightness_filter_max_brightness: 256
    i_enable_companding: false
    i_enable_decimation_filter: false
    i_decimation_filter_decimation_mode: PIXEL_SKIPPING
    i_decimation_filter_decimation_factor: 1
    i_enable_disparity_shift: false
    i_disparity_shift: 0
    i_enable_distortion_correction: false
    i_enable_lazy_publisher: true
    i_enable_spatial_filter: false
    i_spatial_filter_hole_filling_radius: 2
    i_spatial_filter_alpha: 0.5
    i_spatial_filter_delta: 20
    i_spatial_filter_iterations: 1
    i_enable_spatial_nn: false
    i_enable_speckle_filter: false
    i_speckle_filter_speckle_range: 50
    i_enable_temporal_filter: false
    i_temporal_filter_alpha: 0.4
    i_temporal_filter_delta: 20
    i_temporal_filter_persistency: VALID_2_IN_LAST_4
    i_enable_threshold_filter: false
    i_threshold_filter_min_range: 400
    i_threshold_filter_max_range: 15000
    i_exposure_offset: 0
    i_extended_disp: false
    i_get_base_device_timestamp: false
    i_height: 720
    i_left_rect_add_exposure_offset: false
    i_left_rect_enable_feature_tracker: false
    i_left_rect_exposure_offset: 0
    i_left_rect_low_bandwidth: false
    i_left_rect_low_bandwidth_bitrate: 0
    i_left_rect_low_bandwidth_ffmpeg_encoder: libx264
    i_left_rect_low_bandwidth_frame_freq: 30
    i_left_rect_low_bandwidth_profile: 4
    i_left_rect_low_bandwidth_quality: 50
    i_left_rect_publish_compressed: false
    i_left_rect_synced: true
    i_left_socket_id: 1
    i_low_bandwidth: false
    i_low_bandwidth_bitrate: 0
    i_low_bandwidth_ffmpeg_encoder: libx264
    i_low_bandwidth_profile: 4
    i_low_bandwidth_quality: 50
    i_lr_check: true                  # Left‑right consistency check
    i_lrc_threshold: 10
    i_max_q_size: 30
    i_output_disparity: false
    i_publish_left_rect: false
    i_publish_right_rect: false
    i_publish_synced_rect_pair: false
    i_publish_topic: true             # Publish depth/pointcloud?
    i_rectify_edge_fill_color: 0
    i_reverse_stereo_socket_order: false
    i_right_rect_add_exposure_offset: false
    i_right_rect_enable_feature_tracker: false
    i_right_rect_exposure_offset: 0
    i_right_rect_low_bandwidth: false
    i_right_rect_low_bandwidth_bitrate: 0
    i_right_rect_low_bandwidth_ffmpeg_encoder: libx264
    i_right_rect_low_bandwidth_frame_freq: 30
    i_right_rect_low_bandwidth_profile: 4
    i_right_rect_low_bandwidth_quality: 50
    i_right_rect_publish_compressed: false
    i_right_rect_synced: true
    i_right_socket_id: 2
    i_set_disparity_to_depth_use_spec_translation: false
    i_set_input_size: false
    i_socket_name: rgb                # Which socket provides the rectified images?
    i_spatial_nn_source: right
    i_stereo_conf_threshold: 240
    i_subpixel: true                  # Sub‑pixel disparity estimation
    i_subpixel_fractional_bits: 3
    i_synced: false
    i_update_ros_base_time_on_ros_msg: false
    i_width: 1280
    use_sim_time: false

  # -------------------- Time‑of‑Flight (ToF) sensor --------------------
  tof:
    i_publish_topic: true             # Publish ToF data?
    i_synced: true
    i_calibration_file: ""
    i_low_bandwidth: false            # Low‑bandwidth mode (may be unstable)
    i_low_bandwidth_bitrate: 0
    i_low_bandwidth_ffmpeg_encoder: libx264
    i_low_bandwidth_profile: 4
    i_low_bandwidth_quality: 80
    i_get_base_device_timestamp: false
    i_update_ros_base_time_on_ros_msg: false
    i_enable_lazy_publisher: false
    i_add_exposure_offset: false
    i_exposure_offset: 0
    i_reverse_stereo_socket_order: false
    i_board_socket_id: 0
    i_max_q_size: 8
    i_width: 640
    i_height: 480
    i_fps: 30.0
    i_enable_optical_correction: false
    i_enable_fppn_correction: false
    i_enable_temperature_correction: false
    i_enable_wiggle_correction: false
    i_enable_phase_unwrapping: false
    i_enable_phase_shuffle_temporal_filter: true
    i_phase_unwrapping_level: 4
    i_phase_unwrap_error_threshold: 100
    i_median_filter: MEDIAN_OFF
